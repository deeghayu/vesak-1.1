<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අසිරිමත් වෙසක් මංගල්‍යය - Digital Thorana</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Noto+Sans+Sinhala:wght@300;500;700&display=swap');

        :root {
            --gold: #ffd700;
            --neon-red: #ff3131;
            --neon-blue: #00d2ff;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Noto Sans Sinhala', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; opacity: 0.15; pointer-events: none;
        }
        .video-bg iframe { width: 100vw; height: 100vh; object-fit: cover; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.9) 100%);
            z-index: -2;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; text-align: center; }

        header h1 { 
            font-family: 'Abhaya Libre', serif; 
            font-size: clamp(2.2rem, 6vw, 3.5rem); 
            color: var(--gold); 
            text-shadow: 0 0 25px rgba(255,215,0,0.5); 
        }

        /* --- LOTUS THORANA STRUCTURE --- */
        .thorana-wrapper {
            position: relative;
            width: 100%; max-width: 800px;
            margin: 80px auto;
            aspect-ratio: 1.3 / 1;
        }

        .petal {
            position: absolute;
            background: #000;
            overflow: hidden;
            z-index: 2;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        /* Middle Main Petal (Video) */
        .petal-center {
            width: 48%; height: 65%;
            top: 0%; left: 26%;
            border-radius: 50% 50% 20px 20px;
            z-index: 5;
            border: 6px solid var(--gold);
            animation: mainGlow 3s infinite alternate;
        }

        /* Side Petals (Budu Hamuduruwo Photos) */
        .petal-side {
            width: 38%; height: 50%;
            border-radius: 50%;
            top: 25%;
            border: 4px solid rgba(255, 215, 0, 0.3);
            background-size: cover;
            background-position: center;
            filter: brightness(0.8) sepia(0.2);
        }
        .left { 
            left: 0; transform: rotate(-15deg); 
            background-image: url('https://i.pinimg.com/736x/8a/6a/9c/8a6a9c148f0a86d9a4055f75e7a9643d.jpg'); 
        }
        .right { 
            right: 0; transform: rotate(15deg); 
            background-image: url('https://i.pinimg.com/736x/8a/6a/9c/8a6a9c148f0a86d9a4055f75e7a9643d.jpg'); 
        }

        @keyframes mainGlow {
            0% { box-shadow: 0 0 20px var(--neon-red); }
            100% { box-shadow: 0 0 50px var(--gold); }
        }

        /* Animated Rings */
        .glow-ring {
            position: absolute; border-radius: inherit; pointer-events: none; z-index: 6;
        }
        .r-mid { top: -12px; left: -12px; right: -12px; bottom: -12px; border: 5px dotted var(--neon-blue); animation: rotateR 6s linear infinite; }
        .r-side { top: -10px; left: -10px; right: -10px; bottom: -10px; border: 3px dashed var(--gold); animation: blink 0.8s infinite; }

        @keyframes rotateR { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Play Button Overlay */
        .play-gate {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border-radius: inherit;
        }
        .play-icon {
            width: 70px; height: 70px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
            box-shadow: 0 0 20px var(--gold);
        }

        /* Footer */
        footer { margin-top: 80px; padding: 40px; border-top: 1px solid rgba(255,215,0,0.2); }
        .dev-name { color: var(--gold); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="video-bg">
        <iframe src="https://www.youtube.com/embed/d2FI9OfkqR0?autoplay=1&mute=1&loop=1&playlist=d2FI9OfkqR0&controls=0" frameborder="0"></iframe>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <header data-aos="fade-down">
            <h1 class="float-anim">අසිරිමත් වෙසක් මංගල්‍යය</h1>
            <p style="color: #aaa;">බුද්ධ වර්ෂ 2570 ඩිජිටල් තොරණ විවරණය</p>
        </header>

        <div class="thorana-wrapper" data-aos="zoom-in">
            <!-- Center Petal (NEW VIDEO) -->
            <div class="petal petal-center">
                <div class="glow-ring r-mid"></div>
                
                <div class="play-gate" id="gate-mid" onclick="playThorana()">
                    <div class="play-icon">
                        <svg width="35" height="35" viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <span style="font-weight: bold; color: var(--gold);">නරඹන්න</span>
                </div>
                
                <iframe id="vid-mid" width="100%" height="100%" 
                    src="https://www.youtube.com/embed/5RHWeQyC-T0?enablejsapi=1&controls=0&mute=1&rel=0" 
                    frameborder="0"></iframe>
            </div>

            <!-- Left Petal (Budu Hamuduruwo) -->
            <div class="petal petal-side left">
                <div class="glow-ring r-side"></div>
            </div>

            <!-- Right Petal (Budu Hamuduruwo) -->
            <div class="petal petal-side right">
                <div class="glow-ring r-side"></div>
            </div>
        </div>

        <div style="margin-top: 50px;" data-aos="fade-up">
            <h3 style="color: var(--gold);">මහා ශාන්ති විවරණය</h3>
            <p style="max-width: 700px; margin: 0 auto; color: #ccc; line-height: 1.8;">
                මෙම ඩිජිටල් තොරණ මගින් බුදුරජාණන් වහන්සේගේ අපරිමිත ගුණාංග සහ උතුම් ධර්මය නවීන තාක්ෂණය ඔස්සේ විදහා දක්වයි.
            </p>
        </div>

        <footer>
            <p>&copy; 2026 Designed & Developed by <a href="#" class="dev-name">M.U.R.D.D. Fonseka</a></p>
            <p style="font-size: 0.75rem; color: #444;">MAHANAMA COLLEGE MEDIA UNIT</p>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });

        function playThorana() {
            const gate = document.getElementById('gate-mid');
            const vid = document.getElementById('vid-mid');
            
            vid.src = vid.src.replace("mute=1", "mute=0") + "&autoplay=1";
            gate.style.opacity = '0';
            setTimeout(() => gate.style.display = 'none', 500);
        }
    </script>
</body>
</html>
